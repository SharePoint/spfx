# Pipeline: Publish Packages
# Trigger: When CHANGELOG files change on main (indicating a bump PR was merged).
# Purpose: Validate the version bump merge, download pre-packed artifacts from the
#          bump pipeline, and publish to npm.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'apps/spfx-cli/CHANGELOG.md'
      - 'api/spfx-template-api/CHANGELOG.md'
      - 'common/config/rush/version-policies.json'

pr: none

variables:
  - name: FORCE_COLOR
    value: 1

resources:
  repositories:
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      os: windows
    stages:
      - stage: Validate
        displayName: 'Validate Version Bump Merge'
        jobs:
          - job: ValidateMerge
            displayName: 'Check if version bump PR'
            pool:
              name: publish-rushstack
              os: linux
            steps:
              - checkout: self
                persistCredentials: true

              - template: /common/config/azure-pipelines/templates/install-node.yaml@self

              - script: node common/scripts/install-run-rush.js install --to repo-toolbox
                displayName: 'Rush Install (repo-toolbox)'

              - script: node common/scripts/install-run-rush.js build --to repo-toolbox
                displayName: 'Rush Build (repo-toolbox)'

              - script: node tools/repo-toolbox/lib/start.js validate-version-bump
                name: CheckCommit
                displayName: 'Validate Version Bump PR'

      - stage: Publish
        displayName: 'Publish Packages'
        dependsOn: Validate
        condition: eq(dependencies.Validate.outputs['ValidateMerge.CheckCommit.IsVersionBumpMerge'], 'true')
        jobs:
          - job: PublishPackages
            displayName: 'Publish to npm'
            pool:
              name: publish-rushstack
              os: linux
            templateContext:
              outputParentDirectory: $(Build.ArtifactStagingDirectory)
              outputs:
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/published-versions
                  artifactName: published-versions
            steps:
              - checkout: self
                persistCredentials: true

              - template: /common/config/azure-pipelines/templates/install-node.yaml@self

              - script: node common/scripts/install-run-rush.js install
                displayName: 'Rush Install'

              - script: node common/scripts/install-run-rush.js build --to repo-toolbox
                displayName: 'Rush Build (repo-toolbox)'

              # Download the pre-packed tarballs and metadata from the bump pipeline
              # run that created the version bump PR. Uses System.AccessToken to
              # authenticate against the Azure DevOps Pipelines API.
              - script: >-
                  node tools/repo-toolbox/lib/start.js download-bump-artifacts
                  --artifact-name packages
                  --artifact-name metadata
                  --artifact-name package-versions
                  --target-path $(Pipeline.Workspace)
                displayName: 'Download Bump Pipeline Artifacts'
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # Publish the downloaded tarballs to npm
              - script: >-
                  node tools/repo-toolbox/lib/start.js publish-tarballs
                  --artifact-path $(Pipeline.Workspace)/packages
                displayName: 'Publish Packages to npm'
                env:
                  NPM_AUTH_TOKEN: $(npmToken)

              # Copy the published-versions artifact from the bump pipeline so it can
              # be re-published as an artifact of this pipeline run.
              - bash: |
                  mkdir -p $(Build.ArtifactStagingDirectory)/published-versions
                  cp $(Pipeline.Workspace)/package-versions/* $(Build.ArtifactStagingDirectory)/published-versions/
                displayName: 'Stage Published Versions Artifact'
