# Template: Publish packed tarballs to npm
# Publishes all .tgz files from the downloaded artifacts directory.

parameters:
  - name: ArtifactPath
    type: string
    default: '$(Pipeline.Workspace)/packages'

steps:
  - bash: |
      set -e

      PACKAGES_DIR="${{ parameters.ArtifactPath }}"
      echo "Looking for packages in: ${PACKAGES_DIR}"

      if [ ! -d "$PACKAGES_DIR" ]; then
        echo "##[error]Packages directory not found: ${PACKAGES_DIR}"
        exit 1
      fi

      TGZ_FILES=$(find "$PACKAGES_DIR" -name '*.tgz' -type f)

      if [ -z "$TGZ_FILES" ]; then
        echo "##[error]No .tgz files found in ${PACKAGES_DIR}"
        exit 1
      fi

      echo "Found packages to publish:"
      echo "$TGZ_FILES"
      echo ""

      SUCCESS_COUNT=0
      FAIL_COUNT=0
      while IFS= read -r TGZ_FILE; do
        echo "Publishing: $(basename "$TGZ_FILE")"
        if npm publish "$TGZ_FILE" --access public; then
          echo "Successfully published: $(basename "$TGZ_FILE")"
          SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
        else
          echo "##[error]Failed to publish: $(basename "$TGZ_FILE")"
          FAIL_COUNT=$((FAIL_COUNT + 1))
        fi
        echo ""
      done <<< "$TGZ_FILES"

      echo "Published: ${SUCCESS_COUNT}, Failed: ${FAIL_COUNT}"

      if [ "$FAIL_COUNT" -ne 0 ]; then
        echo "##[error]One or more packages failed to publish."
        exit 1
      fi
    displayName: 'Publish packages to npm'
    env:
      NPM_AUTH_TOKEN: $(npmToken)
