# Template: Download artifacts from the bump pipeline run
# Finds the PR that produced the current merge commit, reads its SourceBuild: label
# to get the bump pipeline run ID, then downloads its artifacts.
# Requires checkout with persistCredentials: true.

parameters:
  - name: PipelineName
    type: string
    default: 'bump-versions'
  - name: TargetPath
    type: string
    default: $(Pipeline.Workspace)

steps:
  - bash: |
      set -e

      # Extract repository slug from git remote
      REPO_SLUG=$(git remote get-url origin \
        | sed -E 's#.*github\.com[:/](.+/[^.]+)(\.git)?$#\1#')
      echo "Repository: ${REPO_SLUG}"

      # Extract authorization header from git config (set by checkout with persistCredentials)
      AUTH_HEADER=$(git config --get-regexp 'http\..*\.extraheader' \
        | head -1 | sed 's/^[^ ]* //')
      if [ -z "$AUTH_HEADER" ]; then
        echo "##[error]Could not extract authorization header from git config."
        exit 1
      fi

      CURL_CONFIG=$(mktemp)
      trap 'rm -f "$CURL_CONFIG"' EXIT
      printf '%s\n' "-H \"${AUTH_HEADER}\"" > "$CURL_CONFIG"
      printf '%s\n' '-H "Accept: application/vnd.github+json"' >> "$CURL_CONFIG"

      API_BASE="https://api.github.com/repos/${REPO_SLUG}"
      COMMIT_SHA=$(git rev-parse HEAD)
      echo "Merge commit SHA: ${COMMIT_SHA}"

      # Find the PR that produced this merge commit
      PR_DATA=$(curl -s -f -K "$CURL_CONFIG" \
        "${API_BASE}/commits/${COMMIT_SHA}/pulls")
      PR_NUMBER=$(echo "$PR_DATA" | jq '.[0].number // empty')

      if [ -z "$PR_NUMBER" ]; then
        echo "##[error]Could not find a PR associated with commit ${COMMIT_SHA}."
        exit 1
      fi
      echo "Found PR #${PR_NUMBER}"

      # Read labels from the PR to find SourceBuild:<id>
      LABELS=$(curl -s -f -K "$CURL_CONFIG" \
        "${API_BASE}/issues/${PR_NUMBER}/labels")
      SOURCE_BUILD_LABEL=$(echo "$LABELS" \
        | jq -r '.[].name | select(startswith("SourceBuild:"))' | tail -1)

      if [ -z "$SOURCE_BUILD_LABEL" ]; then
        echo "##[error]PR #${PR_NUMBER} does not have a SourceBuild: label."
        exit 1
      fi

      PIPELINE_RUN_ID=$(echo "$SOURCE_BUILD_LABEL" | cut -d: -f2)
      echo "Found bump pipeline run ID: ${PIPELINE_RUN_ID}"
      echo "##vso[task.setvariable variable=BumpPipelineRunId]${PIPELINE_RUN_ID}"
    displayName: 'Find Bump Pipeline Run ID from PR Label'

  - task: DownloadPipelineArtifact@2
    displayName: 'Download Package Artifacts'
    inputs:
      buildType: 'specific'
      project: '$(System.TeamProject)'
      definition: '${{ parameters.PipelineName }}'
      buildVersionToDownload: 'specific'
      buildId: $(BumpPipelineRunId)
      artifactName: 'packages'
      targetPath: '${{ parameters.TargetPath }}/packages'

  - task: DownloadPipelineArtifact@2
    displayName: 'Download Metadata Artifact'
    inputs:
      buildType: 'specific'
      project: '$(System.TeamProject)'
      definition: '${{ parameters.PipelineName }}'
      buildVersionToDownload: 'specific'
      buildId: $(BumpPipelineRunId)
      artifactName: 'metadata'
      targetPath: '${{ parameters.TargetPath }}/metadata'

  - bash: |
      echo "Downloaded artifacts from bump pipeline run: $(BumpPipelineRunId)"
      echo "Metadata contents:"
      cat ${{ parameters.TargetPath }}/metadata/artifact-metadata.json

      echo ""
      echo "Package artifacts:"
      ls -lh ${{ parameters.TargetPath }}/packages/
    displayName: 'Verify Downloaded Artifacts'
